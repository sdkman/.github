name: Reusable - Notify on Failure

on:
  workflow_call:
    secrets:
      OPENCLAW_HOOK_URL:
        required: true
      OPENCLAW_HOOK_TOKEN:
        required: true

jobs:
  notify:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Notify
        env:
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HOOK_URL: ${{ secrets.OPENCLAW_HOOK_URL }}
          HOOK_TOKEN: ${{ secrets.OPENCLAW_HOOK_TOKEN }}
        run: |
          TEXT="❌ ${WORKFLOW} failed: ${REPO}"
          TEXT+=$'\nRun: '"${RUN_URL}"
          PAYLOAD=$(jq -n --arg text "$TEXT" '{text: $text, deliver: true, channel: "discord", to: "1474759623209783327"}')
          curl -sf -X POST \
            -H "Authorization: Bearer ${HOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$HOOK_URL"
